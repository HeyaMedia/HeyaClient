<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d12" />
    <title>Heya</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0b0d12;
        color: #f7f7f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, #22283a 0, transparent 45%),
          #0b0d12;
      }

      main {
        width: min(32rem, calc(100vw - 3rem));
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 5rem);
        letter-spacing: -0.08em;
      }

      p {
        margin: 1rem 0 0;
        color: #a9afbd;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Heya</h1>
      <p>The native shell is ready. Server connection setup comes next.</p>
    </main>
  </body>
</html>
