name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default-mit-build:
    name: Default MIT build has no MPV runtime
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: 1.96.1
          components: rustfmt

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Check bootstrap types
        run: bun run bootstrap:check

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test default Rust build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets

      - name: Build default application bundle
        run: bun tauri build --bundles app --no-sign

      - name: Verify MPV is not bundled or linked
        run: python3 scripts/verify-no-bundled-libmpv.py src-tauri/target/release/bundle/macos/Heya.app

  windows-x64:
    name: Windows x64 audio and MPV preview
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Check bootstrap types
        run: bun run bootstrap:check

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test default Windows build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets

      - name: Lint default Windows build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings

      - name: Build normal Windows installer
        run: bun tauri build --bundles nsis --no-sign

      - name: Verify normal build has no MPV dependency
        run: python scripts/verify-no-bundled-libmpv.py src-tauri/target/release/heya-client.exe

      - name: Prepare pinned Windows MPV development runtime
        shell: pwsh
        run: |
          $runtime = & ./scripts/prepare-windows-libmpv.ps1 `
            -Architecture x86_64 `
            -OutputDirectory "$env:RUNNER_TEMP/heya-libmpv"
          "HEYA_LIBMPV_DIR=$runtime" >> $env:GITHUB_ENV
          "HEYA_MPV_RUNTIME_DIR=$runtime" >> $env:GITHUB_ENV
          $runtime >> $env:GITHUB_PATH

      - name: Test native MPV Windows build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets --features native-mpv

      - name: Lint native MPV Windows build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets --features native-mpv -- -D warnings

      - name: Build native MPV Windows preview
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked --features native-mpv --bin heya-client

      - name: Stage native MPV preview
        shell: pwsh
        run: |
          $preview = "$env:RUNNER_TEMP/heya-windows-x64-native-mpv-preview"
          New-Item -ItemType Directory -Force $preview | Out-Null
          Copy-Item src-tauri/target/debug/heya-client.exe "$preview/Heya.exe"
          Copy-Item "$env:HEYA_MPV_RUNTIME_DIR/libmpv-2.dll" $preview
          Copy-Item "$env:HEYA_MPV_RUNTIME_DIR/provider-receipt.json" $preview
          Copy-Item docs/windows-testing.md "$preview/TESTING.md"
          @"
          This private development preview uses the pinned libmpv provider described at:
          https://github.com/shinchiro/mpv-winbuild-cmake/releases/tag/20260610

          mpv revision: 304426c390901436fb1d4a63efbd582ae80c88f4
          archive SHA-256: 8cbb25ea784f01afbb3f904217cab1317430a8bcfd5680fd827a866367f71cc9

          It is not a production HeyaClient release. See TESTING.md.
          "@ | Set-Content -Encoding UTF8 "$preview/MPV-PROVIDER.txt"

      - name: Upload normal Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: heya-windows-x64-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload native MPV Windows preview
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: heya-windows-x64-native-mpv-preview
          path: ${{ runner.temp }}/heya-windows-x64-native-mpv-preview
          if-no-files-found: error
          retention-days: 7
