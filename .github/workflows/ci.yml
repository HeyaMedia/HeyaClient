name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.name }} checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-15
          - name: Windows x64
            os: windows-2025
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Check application version synchronization
        run: python scripts/check-version-sync.py

      - name: Check bootstrap types
        run: bun run bootstrap:check

      - name: Build bootstrap frontend
        run: bun run bootstrap:build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test Rust build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets

      - name: Lint Rust build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings
