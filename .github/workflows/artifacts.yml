name: Desktop artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-arm64:
    name: macOS ARM64 app (Rust audio, runtime system MPV)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        run: python3 scripts/check-version-sync.py

      - name: Check bootstrap types
        run: bun run bootstrap:check

      - name: Build bootstrap frontend
        run: bun run bootstrap:build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test default Rust build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets

      - name: Lint default Rust build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings

      - name: Lint runtime MPV macOS build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets --features native-mpv -- -D warnings

      - name: Build macOS release and signed updater artifact
        run: bun tauri build --features native-mpv --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Verify MPV is loaded only from the user's system
        run: python3 scripts/verify-no-bundled-libmpv.py src-tauri/target/release/bundle/macos/Heya.app

      - name: Upload macOS release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: heya-macos-arm64-release
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 14

  windows-x64:
    name: Windows x64 app (Rust audio, installable MPV)
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        run: python scripts/check-version-sync.py

      - name: Check bootstrap types
        run: bun run bootstrap:check

      - name: Build bootstrap frontend
        run: bun run bootstrap:build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test default Windows build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets

      - name: Lint default Windows build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings

      - name: Prepare pinned Windows MPV test runtime
        shell: pwsh
        run: |
          $runtime = & ./scripts/prepare-windows-libmpv.ps1 `
            -Architecture x86_64 `
            -OutputDirectory "$env:RUNNER_TEMP/heya-libmpv"
          "HEYA_LIBMPV_PATH=$runtime/libmpv-2.dll" >> $env:GITHUB_ENV
          "HEYA_MPV_PROVIDER_ARCHIVE=$env:RUNNER_TEMP/heya-libmpv/provider.7z" >> $env:GITHUB_ENV

      - name: Test native MPV Windows build
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets --features native-mpv

      - name: Lint native MPV Windows build
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets --features native-mpv -- -D warnings

      - name: Build Windows release and signed updater artifact
        run: bun tauri build --features native-mpv --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Verify MPV is loaded only from Heya app data
        run: python scripts/verify-no-bundled-libmpv.py src-tauri/target/release/heya-client.exe

      - name: Upload normal Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: heya-windows-x64-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error
          retention-days: 14


  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - macos-arm64
      - windows-x64
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download macOS release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: heya-macos-arm64-release
          path: release-assets/macos

      - name: Download Windows release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: heya-windows-x64-installer
          path: release-assets/windows

      - name: Create signed updater manifest
        run: |
          python3 scripts/create-updater-manifest.py \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --macos release-assets/macos \
            --windows release-assets/windows \
            --output release-assets/latest.json

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: HeyaClient ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release-assets/macos/**/*
            release-assets/windows/**/*
            release-assets/latest.json
